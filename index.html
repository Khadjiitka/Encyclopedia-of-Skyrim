    <div class="cursor-glow"></div>

    <script>

        document.addEventListener("mousemove", (e) => {

            const x = e.clientX;
            const y = e.clientY;

            /* создаём несколько снежинок для длинного хвоста */

            for (let i = 0; i < 3; i++) {

                const snow = document.createElement("div");
                snow.className = "snow-particle";

                const size = Math.random() * 10 + 4;
                const offsetX = (Math.random() - 0.5) * 20;
                const offsetY = (Math.random() - 0.5) * 20;

                snow.style.width = size + "px";
                snow.style.height = size + "px";

                snow.style.left = (x + offsetX) + "px";
                snow.style.top = (y + offsetY) + "px";

                /* эффект ветра */

                const wind = (Math.random() - 0.5) * 60 + "px";
                snow.style.setProperty("--windX", wind);

                document.body.appendChild(snow);

                setTimeout(() => {
                    snow.remove();
                }, 1600);
            }

            /* ледяные искры */

            if (Math.random() > 0.5) {

                const spark = document.createElement("div");
                spark.className = "ice-spark";

                spark.style.left = x + "px";
                spark.style.top = y + "px";

                const wind = (Math.random() - 0.5) * 40 + "px";
                spark.style.setProperty("--windX", wind);

                document.body.appendChild(spark);

                setTimeout(() => {
                    spark.remove();
                }, 1000);
            }

        });

    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const overlay = document.querySelector('.page-transition-overlay');

            // 1. При загрузке страницы плавно убираем оверлей
            if (overlay) {
                // Небольшая задержка, чтобы браузер успел отрисовать начало анимации
                setTimeout(() => {
                    overlay.classList.add('fade-out');
                }, 100);
            }

            // 2. Перехватываем клики по ссылкам для плавного ухода
            const links = document.querySelectorAll('a');

            links.forEach(link => {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');

                    // Проверяем, что ссылка ведет на другую страницу, а не является якорем (#) или внешней
                    if (href && !href.startsWith('#') && !link.target && href !== 'javascript:void(0);') {
                        e.preventDefault(); // Останавливаем мгновенный переход

                        overlay.classList.remove('fade-out');
                        overlay.classList.add('fade-in');

                        // Ждем окончания анимации (0.6s) и переходим
                        setTimeout(() => {
                            window.location.href = href;
                        }, 600);
                    }
                });
            });
        });



        document.addEventListener("DOMContentLoaded", () => {
                const toggleBtn = document.querySelector('.mobile-menu-toggle');
                const sideMenu = document.querySelector('.side-menu');

                toggleBtn.addEventListener('click', () => {
                    sideMenu.classList.toggle('active');

                    // Анимация иконки бургера (опционально)
                    const spans = toggleBtn.querySelectorAll('span');
                    spans.forEach(span => span.classList.toggle('open'));
                });

                // Закрывать меню при клике на ссылку (важно для мобильных)
                const menuLinks = document.querySelectorAll('.side-menu a');
                menuLinks.forEach(link => {
                    link.addEventListener('click', () => {
                        sideMenu.classList.remove('active');
                    });
                });
            });
    </script>
</body>
