    <style>
        /* Слой перехода */
.page-transition-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #000; 
    z-index: 9999;
    pointer-events: none; 
    transition: opacity 0.6s ease-in-out;
}

.page-transition-overlay.fade-out {
    opacity: 0;
}

.page-transition-overlay.fade-in {
    opacity: 1;
    pointer-events: all;
}


        * {

        }

        .container {

            .right-panel {

}
/* Кнопка музыки в левом верхнем углу */
.music-control {
    position: fixed;
    top: 25px;
    left: 25px;
    z-index: 10001;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(10, 10, 10, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
}

.music-control:hover {
    border-color: rgba(180, 220, 255, 0.6);
    transform: scale(1.1);
    text-shadow: 0 0 10px #fff;
}

/* Эффект, когда музыка ИГРАЕТ */
.music-control.playing {
    border-color: rgba(0, 200, 255, 0.8);
    color: #00d2ff;
    box-shadow: 0 0 20px rgba(0, 210, 255, 0.4), inset 0 0 10px rgba(0, 210, 255, 0.2);
    animation: musicPulse 2s infinite ease-in-out;
}

/* Тонкая анимация пульсации под музыку */
@keyframes musicPulse {
    0% { transform: scale(1); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
    50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 210, 255, 0.6); }
    100% { transform: scale(1); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
}

/* Иконка паузы (опционально, можно заменить символ через JS, 
   но оставим текущий символ ♪, просто добавим ему вращение) */
.music-control.playing::after {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid rgba(0, 210, 255, 0.3);
    animation: rotateRing 4s linear infinite;
}

@keyframes rotateRing {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

    <script> //  отключение уже выбранных гильдий в других селектах
        document.querySelectorAll(".guild-select").forEach(select => {
                select.addEventListener("change", updateGuildOptions);
            });

            function updateGuildOptions() {

                const selects = document.querySelectorAll(".guild-select");
                let selectedValues = [];

                // собираем выбранные значения
                selects.forEach(sel => {
                    if (sel.value !== "") {
                        selectedValues.push(sel.value);
                    }
                });

                // обновляем каждый select
                selects.forEach(sel => {
                    let currentValue = sel.value;

                    Array.from(sel.options).forEach(option => {

                        if (option.value === "") return;

                        if (selectedValues.includes(option.value) && option.value !== currentValue) {
                            option.disabled = true;
                        } else {
                            option.disabled = false;
                        }

                    });

                });

            }
    </script>

    <script>
        
        let isLogin = false;

        function toggleForms() {
            const reg = document.getElementById("registerForm");
            const log = document.getElementById("loginForm");
            const btn = document.getElementById("toggleBtn");
            const title = document.getElementById("mainTitle");

            if (!isLogin) {
                reg.classList.add("hidden-form");
                log.classList.remove("hidden-form");
                btn.textContent = "Create Character";
                title.textContent = "Enter Skyrim";
                isLogin = true;
            } else {
                log.classList.add("hidden-form");
                reg.classList.remove("hidden-form");
                btn.textContent = "Login";
                title.textContent = "Create Your Character";
                isLogin = false;
            }
        }

        function showWeaponOptions() {
            let value = document.getElementById("weaponClass").value;

            document.querySelectorAll(".sub-options").forEach(el => {
                el.classList.remove("visible");
                el.classList.add("hidden");
            });

            if (value === "one") {
                document.getElementById("oneOptions").classList.add("visible");
            }
            if (value === "two") {
                document.getElementById("twoOptions").classList.add("visible");
            }
            if (value === "archery") {
                document.getElementById("archeryOptions").classList.add("visible");
            }
            if (value === "magic") {
                document.getElementById("magicOptions").classList.add("visible");
            }
        }
    </script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const overlay = document.querySelector('.page-transition-overlay');

        if (overlay) {
            setTimeout(() => {
                overlay.classList.add('fade-out');
            }, 100);
        }

        const links = document.querySelectorAll('a');

        links.forEach(link => {
            link.addEventListener('click', (e) => {
                const href = link.getAttribute('href');

                if (href && !href.startsWith('#') && !link.target && href !== 'javascript:void(0);') {
                    e.preventDefault(); 

                    overlay.classList.remove('fade-out');
                    overlay.classList.add('fade-in');

                    setTimeout(() => {
                        window.location.href = href;
                    }, 600);
                }
            });
        });
    });
</script>
<script>
    const audio = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-toggle');

    const syncMusic = () => {
        const isPlaying = localStorage.getItem('musicPlaying') === 'true';
        const savedTime = localStorage.getItem('musicTime');

        if (savedTime) {
            audio.currentTime = parseFloat(savedTime);
        }

        if (isPlaying) {
            // Пытаемся включить
            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    musicBtn.classList.add('playing');
                }).catch(() => {
                    console.log("Автоплей заблокирован. Ждем клика.");
                    // Если заблокировано, включаем при первом клике по документу
                    document.addEventListener('click', () => {
                        if (localStorage.getItem('musicPlaying') === 'true' && audio.paused) {
                            audio.play();
                            musicBtn.classList.add('playing');
                        }
                    }, { once: true });
                });
            }
        }
    };

    // Сохраняем прогресс
    setInterval(() => {
        if (!audio.paused) {
            localStorage.setItem('musicTime', audio.currentTime);
        }
    }, 1000);

    // Логика кнопки
    musicBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // Чтобы не срабатывал listener на document
        if (audio.paused) {
            audio.play();
            musicBtn.classList.add('playing');
            localStorage.setItem('musicPlaying', 'true');
        } else {
            audio.pause();
            musicBtn.classList.remove('playing');
            localStorage.setItem('musicPlaying', 'false');
        }
    });

    window.addEventListener('load', syncMusic);

    window.addEventListener('beforeunload', () => {
        localStorage.setItem('musicTime', audio.currentTime);
    });
</script>
