<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyrim Character Creation</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English+SC&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style/generator.css">

</head>

<body>
    <div class="page-transition-overlay"></div>




    <audio id="bg-music" loop>
        <source src="../secunda.mp3" type="audio/mpeg">
    </audio>
    <button id="music-toggle" class="music-control">♪</button>





    <div class="container">

        <!-- LEFT -->
        <div class="left-panel">
            <h1 id="mainTitle">Create Your Character</h1>
            <img src="../pic/Pers.gif" alt="Pers">

            <button type="button" id="toggleBtn" onclick="toggleForms()">Login</button>
            <a href="../index.html" class="nav-btn">Main Page</a>
        </div>

        <!-- RIGHT -->
        <div class="right-panel">
            <div class="form-container">

                <!-- REGISTER -->
                <form enctype="multipart/form-data" id="registerForm"
                    class="form-box">


                    <h2>Character Creation</h2>

                    <label>Email <span class="required">*</span></label>
                    <input type="email" name="email" required placeholder="Enter email">

                    <label>Password <span class="required">*</span></label>
                    <input type="password" name="password" required placeholder="Enter password">

                    <label>Character Name <span class="required">*</span></label>
                    <input type="text" name="character_name" required placeholder="Hero name">

                    <label>Gender <span class="required">*</span></label>
                    <select name="gender" required>
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>

                    <label>Race <span class="required">*</span></label>
                    <select name="race" required>
                        <option value="">Select</option>
                        <option>Nord</option>
                        <option>Breton</option>
                        <option>Imperial</option>
                        <option>Redguard</option>
                        <option>Orsimer</option>
                        <option>Bosmer</option>
                        <option>Altmer</option>
                        <option>Dunmer</option>
                        <option>Khajiit</option>
                        <option>Argonian</option>
                    </select>

                    <label>City of Origin</label>
                    <select name="city">

                        <option>Whiterun</option>
                        <option>Solitude</option>
                        <option>Windhelm</option>
                        <option>Riften</option>
                        <option>Markarth</option>
                        <option>Falkreath</option>
                        <option>Morthal</option>
                        <option>Dawnstar</option>
                        <option>Winterhold</option>

                    </select>

                    <label>Guilds</label>

                    <label>Guilds (optional)</label>

                    <div class="guild-group">

                        <select name="guilds[]" class="guild-select">
                            <option value="">None</option>
                            <option>Companions</option>
                            <option>Thieves Guild</option>
                            <option>Dark Brotherhood</option>
                            <option>College of Winterhold</option>
                            <option>Bards College</option>
                            <option>Blades</option>
                            <option>Nightingales</option>
                            <option>Dawnguard</option>
                            <option>Volkihar Clan</option>
                            <option>Imperial Legion</option>
                            <option>Stormcloaks</option>
                        </select>

                        <select name="guilds[]" class="guild-select">
                            <option value="">None</option>
                            <option>Companions</option>
                            <option>Thieves Guild</option>
                            <option>Dark Brotherhood</option>
                            <option>College of Winterhold</option>
                            <option>Bards College</option>
                            <option>Blades</option>
                            <option>Nightingales</option>
                            <option>Dawnguard</option>
                            <option>Volkihar Clan</option>
                            <option>Imperial Legion</option>
                            <option>Stormcloaks</option>
                        </select>

                        <select name="guilds[]" class="guild-select">
                            <option value="">None</option>
                            <option>Companions</option>
                            <option>Thieves Guild</option>
                            <option>Dark Brotherhood</option>
                            <option>College of Winterhold</option>
                            <option>Bards College</option>
                            <option>Blades</option>
                            <option>Nightingales</option>
                            <option>Dawnguard</option>
                            <option>Volkihar Clan</option>
                            <option>Imperial Legion</option>
                            <option>Stormcloaks</option>
                        </select>

                        <select name="guilds[]" class="guild-select">
                            <option value="">None</option>
                            <option>Companions</option>
                            <option>Thieves Guild</option>
                            <option>Dark Brotherhood</option>
                            <option>College of Winterhold</option>
                            <option>Bards College</option>
                            <option>Blades</option>
                            <option>Nightingales</option>
                            <option>Dawnguard</option>
                            <option>Volkihar Clan</option>
                            <option>Imperial Legion</option>
                            <option>Stormcloaks</option>
                        </select>

                    </div>


                    <label>Weapon Class</label>
                    <select id="weaponClass" name="weapon_class" onchange="showWeaponOptions()">
                        <option value="">Select</option>
                        <option value="one">One-Handed</option>
                        <option value="two">Two-Handed</option>
                        <option value="archery">Archery</option>
                        <option value="magic">Magic</option>
                    </select>

                    <div id="oneOptions" class="hidden sub-options">

                        <select name="weapon_type">
                            <option>Mace</option>
                            <option>Sword</option>
                            <option>Axe</option>
                        </select>

                        <select name="weapon_material">
                            <option>Ancient Nord</option>
                            <option>Iron</option>
                            <option>Steel</option>
                            <option>Silver</option>
                            <option>Orcish</option>
                            <option>Dwarven</option>
                            <option>Nord Hero</option>
                            <option>Skyforge Steel</option>
                            <option>Nordic</option>
                            <option>Elven</option>
                            <option>Glass</option>
                            <option>Stalhrim</option>
                            <option>Ebony</option>
                            <option>Daedric</option>
                            <option>Dragonbone</option>
                        </select>

                    </div>

                    <div id="twoOptions" class="hidden sub-options">

                        <select name="weapon_type">
                            <option>Greatsword</option>
                            <option>Battleaxe</option>
                            <option>Warhammer</option>
                        </select>
                        <select name="weapon_material">
                            <option>Ancient Nord</option>
                            <option>Iron</option>
                            <option>Steel</option>
                            <option>Silver</option>
                            <option>Orcish</option>
                            <option>Dwarven</option>
                            <option>Nord Hero</option>
                            <option>Skyforge Steel</option>
                            <option>Nordic</option>
                            <option>Elven</option>
                            <option>Glass</option>
                            <option>Stalhrim</option>
                            <option>Ebony</option>
                            <option>Daedric</option>
                            <option>Dragonbone</option>
                        </select>

                    </div>

                    <div id="archeryOptions" class="hidden sub-options">

                        <select name="weapon_material">
                            <option>Ancient Nord</option>
                            <option>Long Bow</option>
                            <option>Hunting Bow</option>
                            <option>Imperial Bow</option>
                            <option>Nordic Bow</option>
                            <option>Orcish Bow</option>
                            <option>Dwarven Bow</option>
                            <option>Elven Bow</option>
                            <option>Glass Bow</option>
                            <option>Auriel's Bow</option>
                            <option>Stalhrim Bow</option>
                            <option>Ebony Bow</option>
                            <option>Daedric Bow</option>
                            <option>Dragonbone Bow</option>
                        </select>

                    </div>

                    <div id="magicOptions" class="hidden sub-options">

                        <select name="weapon_type">
                            <option>Destruction</option>
                            <option>Alteration</option>
                            <option>Conjuration</option>
                        </select>

                        <div class="sub-options">

                            <select name="spell_element">
                                <option>Fire</option>
                                <option>Frost</option>
                                <option>Shock</option>
                            </select>

                        </div>

                    </div>



                    <label>Standing Stone *</label>
                    <select name="standing_stone" required>
                        <option>The Apprentice Stone</option>
                        <option>The Atronach Stone</option>
                        <option>The Lady Stone</option>
                        <option>The Lord Stone</option>
                        <option>The Lover Stone</option>
                        <option>The Mage Stone</option>
                        <option>The Ritual Stone</option>
                        <option>The Serpent Stone</option>
                        <option>The Steed Stone</option>
                        <option>The Shadow Stone</option>
                        <option>The Thief Stone</option>
                        <option>The Tower Stone</option>
                        <option>The Warrior Stone</option>
                    </select>
                    <p id="stone-description"
                        style="font-size: 14px; color: #aaa; margin-top: 10px; font-style: italic; min-height: 40px;">
                        Choose a standing stone to see its effect...
                    </p>
                    
                    <label>Backstory (optional)</label>
                    <textarea name="backstory" id="backstory"></textarea>

                    <button type="submit" name="register" class="submit-btn">
                        Forge Destiny
                    </button>

                </form>

                <!-- LOGIN -->
                <form  id="loginForm" class="form-box hidden-form">

                    <h2>Enter Skyrim</h2>

                    <label>Email <span class="required">*</span></label>
                    <input type="email" name="email" required>

                    <label>Password <span class="required">*</span></label>
                    <input type="password" name="password" required>

                    <button type="submit" class="submit-btn">
                        Enter
                    </button>

                </form>

            </div>
        </div>

    </div>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
            const firebaseConfig = {
                apiKey: "AIzaSyAabqJzaUr_2ao8GnNfXX2RXykRKTtnkBQ",
                authDomain: "encyclopedia-of-skyrim.firebaseapp.com",
                projectId: "encyclopedia-of-skyrim",
                storageBucket: "encyclopedia-of-skyrim.firebasestorage.app",
                messagingSenderId: "547591246417",
                appId: "1:547591246417:web:0c99692d2f5f5ddd73de70",
                measurementId: "G-QFPWBVMBRV"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Логика регистрации
        const registerForm = document.getElementById('registerForm');
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const formData = new FormData(registerForm);
                const email = formData.get('email');
                const password = formData.get('password');

                try {
                    // Создаем аккаунт
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    // Сохраняем данные персонажа в Firestore
                    await setDoc(doc(db, "characters", user.uid), {
                        name: formData.get('character_name'),
                        race: formData.get('race'),
                        gender: formData.get('gender'),
                        city: formData.get('city'),
                        stone: formData.get('standing_stone'),
                        backstory: formData.get('backstory'),
                        weapon_class: formData.get('weapon_class'),
                        weapon_type: formData.get('weapon_type') || "",
                        weapon_material: formData.get('weapon_material') || "",
                        guilds: Array.from(formData.getAll('guilds[]')).filter(g => g !== ""),
                        avatar: "../../pic/ava.png" // По умолчанию
                    });

                window.location.href = "profile.html";
            } catch (error) {
                alert("A Mistake in the Forging of Destiny: " + error.message);
            }
        });
        // --- ЛОГИКА ВХОДА ---
            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = loginForm.querySelector('input[name="email"]').value;
                const password = loginForm.querySelector('input[name="password"]').value;

                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    window.location.href = "profile.html";
                } catch (error) {
                    alert("Incorrect email or password!");
                }
            });

    </script>


<script src="../scripts/generator.js"></script>

</body>

</html>
