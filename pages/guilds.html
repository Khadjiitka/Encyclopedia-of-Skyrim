<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Guilds of Skyrim</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/guilds.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <div class="page-transition-overlay"></div>


    <audio id="bg-music" loop>
        <source src="../secunda.mp3" type="audio/mpeg">
    </audio>
    <button id="music-toggle" class="music-control">♪</button>


    <div class="background-fog"></div>
    <div class="content">
        <h1>Guilds of Skyrim</h1>
    
        <div class="search-container">
            <input type="text" id="guildSearch" placeholder="Search the archives...">
        </div>
    
        <div class="guild-list" id="guildList">
        </div>
    </div>

    <div id="guildModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody" class="modal-body">
            </div>
        </div>
    </div>

<a href="../index.html" class="back-btn">Main Page</a>

<script src="../scripts/guilds.js"></script>

</body>

</html>
