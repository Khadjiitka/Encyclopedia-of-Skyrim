<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyrim History</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English+SC&display=swap"     rel="stylesheet">
    <link rel="stylesheet" href="../style/history.css">

</head>

<body>
<div class="page-transition-overlay"></div>




<audio id="bg-music" loop>
    <source src="../secunda.mp3" type="audio/mpeg">
</audio>
<button id="music-toggle" class="music-control">♪</button>






    <section class="parallax-container">

        <div class="layer layer-1" data-speed="0.1"></div>
        <div class="layer layer-3" data-speed="0.3"></div>

        <h1 class="main-title" id="title">History</h1>

        <div class="layer layer-4" data-speed="0.5"></div>
        <div class="layer layer-5" data-speed="0.7"></div>
        <div class="layer layer-6" data-speed="1"></div>

        <div class="fade-overlay"></div>

    </section>

    <section class="content-section">

        <div id="story"></div>

        <a href="../index.html" class="back-btn">Main Page</a>

    </section>

    <script>

        /* TITLE ANIMATION */

        window.addEventListener("load", () => {
            document.getElementById("title").classList.add("show");
        });

        /* LOAD JSON */

        fetch("../history_of_tamriel.json")
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById("story");

                    // Теперь проходим по массиву eras
                    data.eras.forEach(era => {
                        // Создаем заголовок Эры
                        const eraTitle = document.createElement("h1");
                        eraTitle.textContent = era.name;
                        container.appendChild(eraTitle);

                        // Проходим по секциям внутри конкретной эры
                        era.sections.forEach(section => {
                            const h2 = document.createElement("h2");
                            h2.textContent = section.title;
                            h2.classList.add("reveal");

                            const p = document.createElement("p");
                            p.textContent = section.content; // В вашем JSON поле называется "content", а не "text"
                            p.classList.add("reveal");

                            container.appendChild(h2);
                            container.appendChild(p);

                            observer.observe(h2);
                            observer.observe(p);
                        });
                    });
                })
                .catch(err => console.error("Ошибка загрузки:", err));

        /* PARALLAX */

        window.addEventListener("scroll", () => {

            let scrollY = window.scrollY;

            document.querySelectorAll(".layer").forEach(layer => {

                let speed = layer.dataset.speed;
                layer.style.transform = `translateY(${scrollY * speed}px)`;

            });

        });

        /* REVEAL SCROLL */

       const observerOptions = {
    threshold: 0.15,       // Элемент считается видимым, когда 15% его площади в кадре
    rootMargin: "0px 0px -10% 0px" // Небольшой отступ снизу, чтобы элементы не всплывали слишком рано
};

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            // Добавляем класс при появлении
            entry.target.classList.add("active");
        } else {
            // УДАЛЯЕМ класс при уходе (скролл вверх или вниз) — это и есть «в обе стороны»
            entry.target.classList.remove("active");
        }
    });
}, observerOptions);

// Находим все элементы, которые должны анимироваться
const revealElements = document.querySelectorAll('.reveal'); // или другой твой селектор

revealElements.forEach(el => {
    observer.observe(el);
});
    </script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const overlay = document.querySelector('.page-transition-overlay');

        // 1. При загрузке страницы плавно убираем оверлей
        if (overlay) {
            // Небольшая задержка, чтобы браузер успел отрисовать начало анимации
            setTimeout(() => {
                overlay.classList.add('fade-out');
            }, 100);
        }

        // 2. Перехватываем клики по ссылкам для плавного ухода
        const links = document.querySelectorAll('a');

        links.forEach(link => {
            link.addEventListener('click', (e) => {
                const href = link.getAttribute('href');

                // Проверяем, что ссылка ведет на другую страницу, а не является якорем (#) или внешней
                if (href && !href.startsWith('#') && !link.target && href !== 'javascript:void(0);') {
                    e.preventDefault(); // Останавливаем мгновенный переход

                    overlay.classList.remove('fade-out');
                    overlay.classList.add('fade-in');

                    // Ждем окончания анимации (0.6s) и переходим
                    setTimeout(() => {
                        window.location.href = href;
                    }, 600);
                }
            });
        });
    });
</script>
<script>
    const audio = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-toggle');

    const syncMusic = () => {
        const isPlaying = localStorage.getItem('musicPlaying') === 'true';
        const savedTime = localStorage.getItem('musicTime');

        if (savedTime) {
            audio.currentTime = parseFloat(savedTime);
        }

        if (isPlaying) {
            // Пытаемся включить
            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    musicBtn.classList.add('playing');
                }).catch(() => {
                    console.log("Автоплей заблокирован. Ждем клика.");
                    // Если заблокировано, включаем при первом клике по документу
                    document.addEventListener('click', () => {
                        if (localStorage.getItem('musicPlaying') === 'true' && audio.paused) {
                            audio.play();
                            musicBtn.classList.add('playing');
                        }
                    }, { once: true });
                });
            }
        }
    };

    // Сохраняем прогресс
    setInterval(() => {
        if (!audio.paused) {
            localStorage.setItem('musicTime', audio.currentTime);
        }
    }, 1000);

    // Логика кнопки
    musicBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // Чтобы не срабатывал listener на document
        if (audio.paused) {
            audio.play();
            musicBtn.classList.add('playing');
            localStorage.setItem('musicPlaying', 'true');
        } else {
            audio.pause();
            musicBtn.classList.remove('playing');
            localStorage.setItem('musicPlaying', 'false');
        }
    });

    window.addEventListener('load', syncMusic);

    window.addEventListener('beforeunload', () => {
        localStorage.setItem('musicTime', audio.currentTime);
    });
</script>
</body>

</html>
