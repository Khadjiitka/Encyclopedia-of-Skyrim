<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyrim History</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English+SC&display=swap"
        rel="stylesheet">

<style>
    .page-transition-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.6s ease-in-out;
    }

    .page-transition-overlay.fade-out {
        opacity: 0;
    }

    .page-transition-overlay.fade-in {
        opacity: 1;
        pointer-events: all;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: "IM Fell English SC", serif;
        color: #e0e0e0;
        background: black;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
    }

    .parallax-container {
        position: relative;
        height: 110vh;
        width: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Виньетка поверх параллакса */
    .parallax-container::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center,
                rgba(0, 0, 0, 0) 20%,
                rgba(0, 0, 0, 0.4) 70%,
                rgba(0, 0, 0, 0.8) 100%);
        z-index: 6;
        pointer-events: none;
    }

    .layer {
        position: absolute;
        top: -10%;
        left: -10%;
        width: 120%;
        height: 120%;
        background-size: cover;
        background-position: center;
        will-change: transform;
    }

    .layer-1 {
        background-image: url('../pic/parallax/Parallax1.png');
    }

    .layer-3 {
        background-image: url('../pic/parallax/Parallax3.png');
    }

    .layer-4 {
        background-image: url('../pic/parallax/Parallax4.png');
        z-index: 7;
    }

    .layer-5 {
        background-image: url('../pic/parallax/Parallax5.png');
        z-index: 9;
    }

    .layer-6 {
        background-image: url('../pic/parallax/Parallax6.png');
        z-index: 11;
    }

    .main-title {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, 60px);
        font-family: 'Cinzel', serif;
        font-size: clamp(40px, 10vw, 120px);
        letter-spacing: clamp(0.2rem, 2vw, 1rem);
        color: white;
        text-shadow: 0 0 40px black, 0 0 10px rgba(255, 255, 255, 0.5);
        opacity: 0;
        transition: all 1.5s cubic-bezier(.22, 1, .36, 1);
        z-index: 10;
        pointer-events: none;
        text-align: center;
        width: 100%;
        padding: 0 20px;
    }

    .main-title.show {
        opacity: 1;
        transform: translate(-50%, -50%);
    }

    .fade-overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 200px;
        background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.8), black);
        z-index: 12;
    }

    .content-section {
        position: relative;
        padding: 80px 8%;
        max-width: 1100px;
        margin: auto;
        font-size: clamp(1.1rem, 2.5vw, 1.45rem);
        line-height: 1.7;
        text-align: justify;
    }

    @media (min-width: 768px) {
        .content-section {
            text-align-last: center;
            padding: 120px 6%;
        }
    }

    .content-section::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url('../pic/parallax/Parallax1.png');
        background-size: cover;
        background-position: center;
        filter: blur(40px) brightness(0.15);
        z-index: -1;
    }

    #story h1 {
        font-family: 'Cinzel', serif;
        font-size: clamp(2.2rem, 6vw, 4rem);
        color: #bdab8d;
        text-align: center;
        margin: 80px 0 40px;
        text-transform: uppercase;
        letter-spacing: 3px;
    }

    .content-section h2 {
        font-family: 'Cinzel', serif;
        font-size: clamp(1.6rem, 4vw, 2.5rem);
        margin-top: 60px;
        margin-bottom: 25px;
        text-align: center;
        color: #fff;
        border-bottom: 1px solid rgba(189, 171, 141, 0.3);
        display: inline-block;
        width: 100%;
        padding-bottom: 10px;
    }

    .content-section p {
        margin-bottom: 30px;
        color: #d1d1d1;
    }

    .reveal {
        opacity: 0;
        transform: translateY(40px);
        transition: all 1s cubic-bezier(.22, 1, .36, 1);
        will-change: opacity, transform;
    }

    .reveal.active {
        opacity: 1;
        transform: translateY(0);
    }

.back-btn {
    position: fixed;
    right: 20px;
    bottom: 20px;

    background: #2d2d2d;
    color: #fff;

    padding: 12px 20px;
    border-radius: 8px;

    text-decoration: none;

    transition: 0.3s;
}

.back-btn:hover {
    background: #444;
    transform: scale(1.05);
}

@media (max-width: 480px) {
    .back-btn {
        right: 10px;
        bottom: 10px;
        padding: 10px 16px;
        font-size: 14px;
        background: rgba(45, 45, 45, 0.9); 
        backdrop-filter: blur(5px); 
    }
}

</style>
</head>

<body>
<div class="page-transition-overlay"></div>




<audio id="bg-music" loop>
    <source src="../secunda.mp3" type="audio/mpeg">
</audio>
<button id="music-toggle" class="music-control">♪</button>






    <section class="parallax-container">

        <div class="layer layer-1" data-speed="0.1"></div>
        <div class="layer layer-3" data-speed="0.3"></div>

        <h1 class="main-title" id="title">History</h1>

        <div class="layer layer-4" data-speed="0.5"></div>
        <div class="layer layer-5" data-speed="0.7"></div>
        <div class="layer layer-6" data-speed="1"></div>

        <div class="fade-overlay"></div>

    </section>

    <section class="content-section">

        <div id="story"></div>

        <a href="../index.html" class="back-btn">Main Page</a>

    </section>

    <script>

        /* TITLE ANIMATION */

        window.addEventListener("load", () => {
            document.getElementById("title").classList.add("show");
        });

        /* LOAD JSON */

        fetch("../history_of_tamriel.json")
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById("story");

                    // Теперь проходим по массиву eras
                    data.eras.forEach(era => {
                        // Создаем заголовок Эры
                        const eraTitle = document.createElement("h1");
                        eraTitle.textContent = era.name;
                        container.appendChild(eraTitle);

                        // Проходим по секциям внутри конкретной эры
                        era.sections.forEach(section => {
                            const h2 = document.createElement("h2");
                            h2.textContent = section.title;
                            h2.classList.add("reveal");

                            const p = document.createElement("p");
                            p.textContent = section.content; // В вашем JSON поле называется "content", а не "text"
                            p.classList.add("reveal");

                            container.appendChild(h2);
                            container.appendChild(p);

                            observer.observe(h2);
                            observer.observe(p);
                        });
                    });
                })
                .catch(err => console.error("Ошибка загрузки:", err));

        /* PARALLAX */

        window.addEventListener("scroll", () => {

            let scrollY = window.scrollY;

            document.querySelectorAll(".layer").forEach(layer => {

                let speed = layer.dataset.speed;
                layer.style.transform = `translateY(${scrollY * speed}px)`;

            });

        });

        /* REVEAL SCROLL */

       const observerOptions = {
    threshold: 0.15,       // Элемент считается видимым, когда 15% его площади в кадре
    rootMargin: "0px 0px -10% 0px" // Небольшой отступ снизу, чтобы элементы не всплывали слишком рано
};

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            // Добавляем класс при появлении
            entry.target.classList.add("active");
        } else {
            // УДАЛЯЕМ класс при уходе (скролл вверх или вниз) — это и есть «в обе стороны»
            entry.target.classList.remove("active");
        }
    });
}, observerOptions);

// Находим все элементы, которые должны анимироваться
const revealElements = document.querySelectorAll('.reveal'); // или другой твой селектор

revealElements.forEach(el => {
    observer.observe(el);
});
    </script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const overlay = document.querySelector('.page-transition-overlay');

        // 1. При загрузке страницы плавно убираем оверлей
        if (overlay) {
            // Небольшая задержка, чтобы браузер успел отрисовать начало анимации
            setTimeout(() => {
                overlay.classList.add('fade-out');
            }, 100);
        }

        // 2. Перехватываем клики по ссылкам для плавного ухода
        const links = document.querySelectorAll('a');

        links.forEach(link => {
            link.addEventListener('click', (e) => {
                const href = link.getAttribute('href');

                // Проверяем, что ссылка ведет на другую страницу, а не является якорем (#) или внешней
                if (href && !href.startsWith('#') && !link.target && href !== 'javascript:void(0);') {
                    e.preventDefault(); // Останавливаем мгновенный переход

                    overlay.classList.remove('fade-out');
                    overlay.classList.add('fade-in');

                    // Ждем окончания анимации (0.6s) и переходим
                    setTimeout(() => {
                        window.location.href = href;
                    }, 600);
                }
            });
        });
    });
</script>
<script>
    const audio = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-toggle');

    const syncMusic = () => {
        const isPlaying = localStorage.getItem('musicPlaying') === 'true';
        const savedTime = localStorage.getItem('musicTime');

        if (savedTime) {
            audio.currentTime = parseFloat(savedTime);
        }

        if (isPlaying) {
            // Пытаемся включить
            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    musicBtn.classList.add('playing');
                }).catch(() => {
                    console.log("Автоплей заблокирован. Ждем клика.");
                    // Если заблокировано, включаем при первом клике по документу
                    document.addEventListener('click', () => {
                        if (localStorage.getItem('musicPlaying') === 'true' && audio.paused) {
                            audio.play();
                            musicBtn.classList.add('playing');
                        }
                    }, { once: true });
                });
            }
        }
    };

    // Сохраняем прогресс
    setInterval(() => {
        if (!audio.paused) {
            localStorage.setItem('musicTime', audio.currentTime);
        }
    }, 1000);

    // Логика кнопки
    musicBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // Чтобы не срабатывал listener на document
        if (audio.paused) {
            audio.play();
            musicBtn.classList.add('playing');
            localStorage.setItem('musicPlaying', 'true');
        } else {
            audio.pause();
            musicBtn.classList.remove('playing');
            localStorage.setItem('musicPlaying', 'false');
        }
    });

    window.addEventListener('load', syncMusic);

    window.addEventListener('beforeunload', () => {
        localStorage.setItem('musicTime', audio.currentTime);
    });
</script>
</body>

</html>
