<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Character Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English+SC&display=swap"
        rel="stylesheet">
        <link rel="stylesheet" href="../style/profile.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


</head>

<body>
    <div class="page-transition-overlay"></div>

    <div class="container">
        <div class="card" id="profileCard" style="display: none;"> <img id="avatarImg" src="../../pic/ava.png"
                class="avatar">
            <h1 id="charName">Loading...</h1>

            <div class="section">
                <div class="section-title">Basic Info</div>
                <p><b>Email:</b> <span id="infoEmail"></span></p>
                <p><b>Race:</b> <span id="infoRace"></span></p>
                <p><b>Gender:</b> <span id="infoGender"></span></p>
                <p><b>City:</b> <span id="infoCity"></span></p>
                <p><b>Standing Stone:</b> <span id="infoStone"></span></p>
            </div>

            <div class="section">
                <div class="section-title">Weapon</div>
                <p><b>Class:</b> <span id="infoWepClass"></span></p>
                <p><b>Type:</b> <span id="infoWepType"></span></p>
                <p><b>Material:</b> <span id="infoWepMat"></span></p>
            </div>

            <div class="section" id="guildsSection" style="display: none;">
                <div class="section-title">Guilds</div>
                <div id="guildsList"></div>
            </div>

            <div class="section">
                <div class="section-title">Backstory</div>
                <div class="backstory" id="infoBackstory"></div>
            </div>
        </div>

        <div class="js-panel">
            <div class="js-content">
                <h1>Adventurer's Board</h1>
                <div id="welcome">
                    <h2>Loading scrolls...</h2>
                </div>
                <p>Choose your activity:</p>
                <button class="btn-generator-nav" onclick="viewUsers()">View other heroes</button>
                <button class="btn-generator-nav" onclick="generateShout()">Generate Dragon Shout</button>
                <button class="btn-generator-nav" onclick="showTamrielDate()">Tamriel Calendar</button>
                <div id="output" class="output"></div>
            </div>

            <div class="bottom-buttons">
                <a href="../../index.html" class="btn-generator-nav"> Main Page </a>
                <button class="btn-generator-nav" onclick="deleteCharacter()">Delete Character</button>
            </div>
        </div>
    </div>

    <script type="module">
        //  используем ссылки на CDN, так как это работает на GitHub Pages без сборки
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
            import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
            import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
            import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
                apiKey: "AIzaSyAabqJzaUr_2ao8GnNfXX2RXykRKTtnkBQ",
                authDomain: "encyclopedia-of-skyrim.firebaseapp.com",
                projectId: "encyclopedia-of-skyrim",
                storageBucket: "encyclopedia-of-skyrim.firebasestorage.app",
                messagingSenderId: "547591246417",
                appId: "1:547591246417:web:0c99692d2f5f5ddd73de70",
                measurementId: "G-QFPWBVMBRV"
            };


        // 3. Инициализация сервисов
            const app = initializeApp(firebaseConfig);
            const analytics = getAnalytics(app); // Подключаем аналитику, она есть в конфиге
            const auth = getAuth(app);
            const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "characters", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();

                    // Заполнение данных (аналог PHP echo)
                    document.getElementById('charName').innerText = data.name || 'Unknown Hero';
                    document.getElementById('avatarImg').src = data.avatar || "../pic/ava.PNG";
                    document.getElementById('infoEmail').innerText = user.email;
                    document.getElementById('infoRace').innerText = data.race;
                    document.getElementById('infoGender').innerText = data.gender;
                    document.getElementById('infoCity').innerText = data.city;
                    document.getElementById('infoStone').innerText = data.stone;
                    document.getElementById('infoWepClass').innerText = data.weapon_class;
                    document.getElementById('infoWepType').innerText = data.weapon_type;
                    document.getElementById('infoWepMat').innerText = data.weapon_material;
                    document.getElementById('infoBackstory').innerText = data.backstory;

                    // Логика гильдий (аналог foreach в PHP)
                    if (data.guilds && data.guilds.length > 0) {
                        const list = document.getElementById('guildsList');
                        list.innerHTML = data.guilds.map(g => `<p>${g}</p>`).join('');
                        document.getElementById('guildsSection').style.display = 'block';
                    }

                    // Приветствие
                    document.getElementById("welcome").innerHTML =
                        `<h2>Welcome back, ${data.name}!</h2><p>Skyrim awaits your next adventure.</p>`;

                    document.getElementById('profileCard').style.display = 'block';
                } else {
                    window.location.href = "generator.html";
                }
            } else {
                window.location.href = "generator.html";
            }
        });

        // Глобальная функция удаления
        window.deleteCharacter = async () => {
            if (confirm("Are you sure you want to delete this character?")) {
                const user = auth.currentUser;
                await deleteDoc(doc(db, "characters", user.uid));
                alert("Character deleted from scrolls.");
                window.location.href = "generator.html";
            }
        };
    </script>

    <script>
        function viewUsers() { alert("Soon you will be able to explore profiles of other heroes."); }

        function generateShout() {
            let words = ["FUS", "RO", "DAH", "YOL", "TOOR", "SHUL", "LOK", "VAH", "KOOR"];
            let shout = words[Math.floor(Math.random() * words.length)] + " " +
                words[Math.floor(Math.random() * words.length)] + " " +
                words[Math.floor(Math.random() * words.length)];
            document.getElementById("output").innerHTML = "Dragon Shout: <b>" + shout + "</b>";
        }

        function showTamrielDate() {
            let today = new Date();
            let months = ["Morning Star", "Sun's Dawn", "First Seed", "Rain's Hand", "Second Seed", "Midyear", "Sun's Height", "Last Seed", "Hearthfire", "Frostfall", "Sun's Dusk", "Evening Star"];
            let days = ["Sundas", "Morndas", "Tirdas", "Middas", "Turdas", "Fredas", "Loredas"];
            document.getElementById("output").innerHTML = "Today in Tamriel:<br>" + days[today.getDay()] + ", " + today.getDate() + " of " + months[today.getMonth()] + ", " + today.getFullYear();
        }

        // Плавный переход (Overlay)
        document.addEventListener("DOMContentLoaded", () => {
            const overlay = document.querySelector('.page-transition-overlay');
            if (overlay) {
                setTimeout(() => { overlay.classList.add('fade-out'); }, 100);
            }
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('#') && !link.target && href !== 'javascript:void(0);') {
                        e.preventDefault();
                        overlay.classList.remove('fade-out');
                        overlay.classList.add('fade-in');
                        setTimeout(() => { window.location.href = href; }, 600);
                    }
                });
            });
        });
    </script>
</body>

</html>
